services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: elaxtra
      POSTGRES_PASSWORD: changeme
      POSTGRES_DB: outreach
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U elaxtra -d outreach"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    command: python -m src.main serve
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://elaxtra:changeme@db:5432/outreach
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - ./docs:/app/docs

volumes:
  pgdata:
