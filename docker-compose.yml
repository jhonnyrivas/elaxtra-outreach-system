services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: elaxtra
      POSTGRES_PASSWORD: changeme
      POSTGRES_DB: outreach
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U elaxtra -d outreach"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
